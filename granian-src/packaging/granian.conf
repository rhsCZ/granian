# Global defaults merged into every enabled app from apps-enabled/*.conf.
host = 127.0.0.1
interface = wsgi
workers = 2
runtime-mode = mt

# Optional global virtualenv for all apps unless overridden per app.
# venv = /srv/common/.venv

# Restart throttling for crash loops.
restart-limit = 5
restart-window = 60
restart-delay = 2

# Boolean values become --key or --no-key.
# websockets is translated to granian's ws/no-ws flags.
websockets = false

# Per-app config files still need their own app= and usually port= or uds=.
