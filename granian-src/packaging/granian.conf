# Global defaults merged into every enabled app from apps-enabled/*.conf.
host = 127.0.0.1
interface = wsgi
workers = 2
runtime-mode = mt

# Optional global virtualenv for all apps unless overridden per app.
# When venv is set, venv/bin/granian must exist unless granian-bin is set.
# venv = /srv/common/.venv
# granian-bin = /usr/bin/granian

# Process identity defaults for all apps.
# If neither user nor group is configured, child processes run as granian:granian.
# If user is configured without group, the user's primary group is used.
# group without user is invalid and makes --check fail.
# user = granian
# group = granian

# Restart throttling for crash loops.
restart-limit = 5
restart-window = 60
restart-delay = 2

# Boolean values become --key or --no-key.
# websockets is translated to granian's ws/no-ws flags.
websockets = false

# Per-app config files still need their own app= and usually port= or uds=.
