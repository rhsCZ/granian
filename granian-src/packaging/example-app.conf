# Example enabled application. Keep per-app ports or UDS paths unique.
app = example.wsgi:app
working-directory = /srv/example
venv = /srv/example/.venv
host = 127.0.0.1
port = 8000
interface = wsgi
workers = 2
runtime-mode = mt
websockets = false

# Repeatable raw arguments can be appended with arg=.
# arg = --log-level
# arg = info

# Repeatable environment variables can be exported for just this app.
# env = PYTHONPATH=/srv/example
