# Example Granian application config.
#
# Format:
# - key = value
# - repeated keys are allowed only for documented repeatable options
# - booleans: true/false, yes/no, on/off, 1/0
# - comments start with '#'
#
# Wrapper-specific keys:
# - app: required target in module:object form; passed as final positional APP
# - working-directory: cwd used before starting Granian
# - venv: Python virtualenv directory; requires venv/bin/granian unless
#   granian-bin is set
# - granian-bin: explicit absolute path to Granian executable
# - user: Unix user for the child Granian process
# - group: Unix group for the child Granian process; requires user=
# - log-dir: base directory for default app logs; default /var/log/granian
# - log-file: stdout log file override for this app
# - error-log-file: stderr log file override for this app; defaults to log-file
# - restart-limit: number of failures allowed inside restart-window before
#   wrapper disables the app until the whole service is restarted
# - restart-window: rolling failure window in seconds for restart-limit
# - restart-delay: sleep in seconds before wrapper restarts a failed app
# - env: repeatable NAME=VALUE environment variable exported for this app
# - arg: repeatable raw command-line argument appended verbatim
#
# Generic mapping:
# - most non-wrapper keys map to Granian CLI as --key value
# - snake_case and snake-case are both accepted
# - boolean keys map to --key / --no-key
# - special case: websockets maps to Granian's --ws / --no-ws
# - per-app values override global defaults for normal options
# - repeatable Granian options append values: env-files, static-path-route,
#   static-path-mount, reload-paths, reload-ignore-dirs,
#   reload-ignore-patterns, reload-ignore-paths, ssl-crl
#
# Process identity:
# - no user/group configured: child runs as granian:granian
# - user without group: child uses the user's primary group
# - group without user: invalid config
#
# Default logs:
# - stdout/stderr: /var/log/granian/<config-name>/<config-name>.log
# - for this file installed as example.conf: /var/log/granian/example/example.log
# - explicit log-file/error-log-file must stay under /var/log/granian/

app = example.wsgi:app
working-directory = /srv/example
venv = /srv/example/.venv
# granian-bin = /usr/bin/granian
# user = example
# group = example
host = 127.0.0.1
port = 8000
interface = wsgi
workers = 2
runtime-mode = mt
websockets = false
restart-limit = 5
restart-window = 60
restart-delay = 2

# Optional per-app environment.
# env = PYTHONPATH=/srv/example

# Optional per-app log overrides.
# log-dir = /var/log/granian
# log-file = /var/log/granian/example/example.log
# error-log-file = /var/log/granian/example/example.err.log

# Optional raw CLI arguments if a key is unsupported or you need exact ordering.
# arg = --log-level
# arg = info

# Network binding:
# - host: listen address
# - port: listen TCP port
# - uds: Unix socket path instead of host/port
# - uds-permissions: octal permissions for created Unix socket
# host = 127.0.0.1
# port = 8000
# uds = /run/granian/example/example.sock
# uds-permissions = 660

# Application protocol:
# - interface: asgi | asginl | rsgi | wsgi
# - http: auto | 1 | 2
# - websockets: wrapper alias for Granian --ws / --no-ws
# interface = wsgi
# http = auto
# websockets = false

# Worker model:
# - workers: process count
# - blocking-threads: blocking thread count per worker
# - blocking-threads-idle-timeout: idle lifetime for blocking threads
# - runtime-threads: runtime thread count per worker
# - runtime-blocking-threads: runtime I/O blocking threads per worker
# - runtime-mode: auto | mt | st
# workers = 2
# blocking-threads = 4
# blocking-threads-idle-timeout = 30
# runtime-threads = 1
# runtime-blocking-threads = 2
# runtime-mode = mt

# Runtime internals:
# - loop: auto | asyncio | rloop | uvloop | winloop
# - task-impl: asyncio | rust
# loop = auto
# task-impl = asyncio

# Connection tuning:
# - backlog: global accept backlog
# - backpressure: concurrent request cap per worker
# backlog = 1024
# backpressure = 1024

# HTTP/1 tuning:
# - http1-buffer-size: max HTTP/1 buffer size
# - http1-header-read-timeout: header read timeout in milliseconds
# - http1-keep-alive: keep-alive enabled/disabled
# - http1-pipeline-flush: pipelined flush aggregation enabled/disabled
# http1-buffer-size = 417792
# http1-header-read-timeout = 30000
# http1-keep-alive = true
# http1-pipeline-flush = false

# HTTP/2 tuning:
# - http2-adaptive-window: adaptive flow control enabled/disabled
# - http2-initial-connection-window-size: connection window size
# - http2-initial-stream-window-size: stream window size
# - http2-keep-alive-interval: ping interval in milliseconds
# - http2-keep-alive-timeout: ping ack timeout
# - http2-max-concurrent-streams: SETTINGS_MAX_CONCURRENT_STREAMS
# - http2-max-frame-size: max frame size
# - http2-max-headers-size: max received header size
# - http2-max-send-buffer-size: max send buffer per stream
# http2-adaptive-window = false
# http2-initial-connection-window-size = 1048576
# http2-initial-stream-window-size = 1048576
# http2-keep-alive-interval = 10000
# http2-keep-alive-timeout = 20
# http2-max-concurrent-streams = 200
# http2-max-frame-size = 16384
# http2-max-headers-size = 16777216
# http2-max-send-buffer-size = 409600

# Logging:
# - log: Granian internal logging enabled/disabled
# - log-level: critical | error | warning | warn | info | debug | notset
# - log-config: JSON logging config file
# - access-log: access log enabled/disabled
# - access-log-fmt: access log format string
# log = true
# log-level = info
# log-config = /etc/granian/logging.json
# access-log = false
# access-log-fmt = %({x-forwarded-for}i)s %r %s %b %D

# TLS / SSL:
# - ssl-certificate: certificate file path
# - ssl-keyfile: PKCS#8 key file path
# - ssl-keyfile-password: key password
# - ssl-protocol-min: tls1.2 | tls1.3
# - ssl-ca: CA file for client verification
# - ssl-crl: CRL file
# - ssl-client-verify: client certificate verification enabled/disabled
# ssl-certificate = /etc/ssl/example.crt
# ssl-keyfile = /etc/ssl/private/example.key
# ssl-keyfile-password = secret
# ssl-protocol-min = tls1.3
# ssl-ca = /etc/ssl/ca.pem
# ssl-crl = /etc/ssl/crl.pem
# ssl-client-verify = false

# Routing and process behavior:
# - url-path-prefix: mount app under URL prefix
# - respawn-failed-workers: Granian worker respawn enabled/disabled
# - respawn-interval: seconds between worker respawns
# - factory: treat app target as factory function
# - process-name: custom process name
# - pid-file: PID file path
# url-path-prefix = /app
# respawn-failed-workers = false
# respawn-interval = 3.5
# factory = false
# process-name = granian-example
# pid-file = /run/granian/example.pid

# Resource limits and worker lifecycle:
# - rss-sample-interval: sampling interval for RSS monitor
# - rss-samples: number of samples above threshold before action
# - workers-lifetime: max worker lifetime before respawn
# - workers-max-rss: max RSS in MiB before respawn
# - workers-kill-timeout: graceful kill timeout
# rss-sample-interval = 30
# rss-samples = 1
# workers-lifetime = 3600
# workers-max-rss = 512
# workers-kill-timeout = 30

# Dotenv and extra environment loading:
# - env-files: repeatable dotenv file paths loaded by Granian itself
# env-files = /etc/default/example.env

# Static file serving:
# - static-path-route: repeatable route prefix for static files
# - static-path-mount: repeatable filesystem path to mount
# - static-path-dir-to-file: index file for directory requests
# - static-path-expires: cache expiry duration; 0 disables
# static-path-route = /static
# static-path-mount = /srv/example/static
# static-path-dir-to-file = index.html
# static-path-expires = 86400

# Metrics exporter:
# - metrics: Prometheus exporter enabled/disabled
# - metrics-scrape-interval: metrics collection interval
# - metrics-address: exporter bind address
# - metrics-port: exporter port
# metrics = false
# metrics-scrape-interval = 15
# metrics-address = 127.0.0.1
# metrics-port = 9090

# Auto-reload:
# - reload: autoreload enabled/disabled
# - reload-paths: repeatable watched paths
# - reload-ignore-dirs: repeatable ignored directory names
# - reload-ignore-patterns: repeatable ignored regex patterns
# - reload-ignore-paths: repeatable ignored absolute paths
# - reload-tick: watch tick in milliseconds
# - reload-ignore-worker-failure: ignore worker failure with reload enabled
# reload = false
# reload-paths = /srv/example
# reload-ignore-dirs = .git
# reload-ignore-patterns = .*\\.pyc$
# reload-ignore-paths = /srv/example/cache
# reload-tick = 50
# reload-ignore-worker-failure = false
